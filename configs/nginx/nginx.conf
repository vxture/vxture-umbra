user  nginx;
worker_processes  auto;
pid   /var/run/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

# Stream module: SNI-based routing at layer 4 (no TLS termination for Xray)
stream {
    log_format stream '$remote_addr [$time_local] $protocol $status '
                      '$bytes_sent $bytes_received $session_time '
                      '"$ssl_preread_server_name"';
    access_log /var/log/nginx/stream-access.log stream;

    include /etc/nginx/stream.d/*.conf;
}

# HTTP module: TLS termination + virtual host routing at layer 7
http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Required for WebSocket proxying (Marzban live logs, Uptime Kuma)
    map $http_upgrade $connection_upgrade {
        default  upgrade;
        ''       close;
    }

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # Real client IP from stream proxy and Xray fallback (both send PROXY protocol)
    real_ip_header    proxy_protocol;
    set_real_ip_from  127.0.0.1;       # nginx stream proxy (same container, loopback)
    set_real_ip_from  172.16.0.0/12;   # Docker bridge network (Xray fallback from umbra-marzban)

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=sub_limit:10m   rate=20r/m;  # subscription endpoint
    limit_req_zone $binary_remote_addr zone=vault_admin:10m rate=5r/m;   # Vaultwarden admin panel

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;
    keepalive_timeout 65;
    server_tokens off;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/atom+xml image/svg+xml;

    # HTTP/80: ACME challenge + redirect only
    server {
        listen 80 default_server;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    include /etc/nginx/conf.d/*.conf;
}
