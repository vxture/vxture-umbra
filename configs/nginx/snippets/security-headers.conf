add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
add_header X-Frame-Options         "SAMEORIGIN"            always;
add_header X-Content-Type-Options  "nosniff"               always;
add_header X-XSS-Protection        "1; mode=block"         always;
add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;
# Cross-origin isolation. COOP severs the opener relationship for cross-origin
# popups (the OIDC flow uses top-level redirects, not popups, so this is safe);
# CORP same-site keeps assets loadable across *.ruyin.ai but not cross-site. The
# CSP here is framing-only (clickjacking) and restricts no resource loading, so
# it is safe on every vhost including Marzban/Vault. A full resource CSP is a
# follow-up (needs a Next.js nonce + browser verification).
add_header Cross-Origin-Opener-Policy   "same-origin" always;
add_header Cross-Origin-Resource-Policy "same-site"   always;
add_header Content-Security-Policy       "frame-ancestors 'self'" always;
