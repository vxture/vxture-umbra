networks:
  umbra-net:
    driver: bridge

services:

  # ── Nginx: Public SNI gateway + HTTP virtual hosts ───────────────────────────
  umbra-nginx:
    image: nginx:alpine
    container_name: umbra-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${DATA_DIR}/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ${DATA_DIR}/nginx/conf.d:/etc/nginx/conf.d:ro
      - ${DATA_DIR}/nginx/stream.d:/etc/nginx/stream.d:ro
      - ${DATA_DIR}/nginx/snippets:/etc/nginx/snippets:ro
      - ${DATA_DIR}/nginx/html:/usr/share/nginx/html:ro
      - ${DATA_DIR}/nginx/private:/etc/nginx/private:ro
      - ${DATA_DIR}/letsencrypt:/etc/letsencrypt:ro
      - ${DATA_DIR}/certbot/www:/var/www/certbot:ro
      - ${DATA_DIR}/nginx/logs:/var/log/nginx
    networks:
      - umbra-net
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Marzban: VPN manager (includes Xray-core subprocess) ─────────────────────
  # TLS is terminated at nginx; Marzban runs plain HTTP on :8000 inside Docker.
  # This avoids the self-signed cert catch-22 on first deploy.
  umbra-marzban:
    image: gozargah/marzban:latest
    container_name: umbra-marzban
    restart: always
    environment:
      UVICORN_HOST: "0.0.0.0"
      UVICORN_PORT: "8000"
      SQLALCHEMY_DATABASE_URL: "sqlite:////var/lib/marzban/db.sqlite3"
      XRAY_JSON: "/var/lib/marzban/xray_config.json"
      XRAY_EXECUTABLE_PATH: "/usr/local/bin/xray"
      XRAY_ASSETS_PATH: "/usr/local/share/xray"
      SUDO_USERNAME: "${MARZBAN_ADMIN_USER}"
      SUDO_PASSWORD: "${MARZBAN_ADMIN_PASSWORD}"
      XRAY_SUBSCRIPTION_URL_PREFIX: "${SUBSCRIPTION_URL_PREFIX}"
      CUSTOM_TEMPLATES_DIRECTORY: "/var/lib/marzban/templates"
      CLASH_SUBSCRIPTION_TEMPLATE: "clash/default.yml"
    volumes:
      - ${DATA_DIR}/marzban:/var/lib/marzban
    networks:
      - umbra-net

  # ── Vaultwarden: Password manager ────────────────────────────────────────────
  # Uses SQLite by default — database stored in the /data volume.
  umbra-vaultwarden:
    image: vaultwarden/server:latest
    container_name: umbra-vaultwarden
    restart: always
    environment:
      DOMAIN: "https://${VAULT_DOMAIN}"
      SIGNUPS_ALLOWED: "false"
      ADMIN_TOKEN: "${VAULTWARDEN_ADMIN_TOKEN}"
      LOG_LEVEL: "warn"
    volumes:
      - ${DATA_DIR}/vaultwarden/data:/data
    networks:
      - umbra-net

  # ── Uptime Kuma: Status monitoring ───────────────────────────────────────────
  umbra-uptime:
    image: louislam/uptime-kuma:1
    container_name: umbra-uptime
    restart: always
    volumes:
      - ${DATA_DIR}/uptime-kuma/data:/app/data
    networks:
      - umbra-net

  # ── VPN Portal: User onboarding static site ───────────────────────────────────
  umbra-portal:
    image: nginx:alpine
    container_name: umbra-portal
    restart: always
    volumes:
      - ${DATA_DIR}/portal/html:/usr/share/nginx/html:ro
    networks:
      - umbra-net

  # ── Docs: Static documentation site ─────────────────────────────────────────
  umbra-docs:
    image: nginx:alpine
    container_name: umbra-docs
    restart: always
    volumes:
      - ${DATA_DIR}/docs/site:/usr/share/nginx/html:ro
    networks:
      - umbra-net

  # ── Shlink: Short link / redirect service ─────────────────────────────────────
  # Uses SQLite — database stored in the /app/data volume.
  umbra-shortlink:
    image: shlinkio/shlink:stable
    container_name: umbra-shortlink
    restart: always
    environment:
      DEFAULT_DOMAIN: "${SHORTLINK_DOMAIN}"
      IS_HTTPS_ENABLED: "true"
      DB_DRIVER: "sqlite"
      INITIAL_API_KEY: "${SHLINK_INITIAL_API_KEY:-}"
    volumes:
      - ${DATA_DIR}/shortlink/data:/app/data
    networks:
      - umbra-net
