name: ci

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop
      - main

concurrency:
  group: ci-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}

jobs:
  quality-gate:
    name: quality-gate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            portals/website/package-lock.json
            portals/console/package-lock.json
            portals/admin/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install portal dependencies
        shell: bash
        run: |
          set -euo pipefail
          npm ci --prefix portals/website
          npm ci --prefix portals/console
          npm ci --prefix portals/admin

      - name: Static script checks
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          for file in deploy/worker-03/*.sh deploy/worker-03/scripts/*.sh deploy/worker-03/lib/*.sh scripts/checks/*.sh scripts/ci/*.sh scripts/github/*.ps1; do
            [ -f "$file" ] || continue
            case "$file" in
              *.sh) bash -n "$file" ;;
            esac
          done
          python -m compileall -q deploy scripts services
          python scripts/checks/06-check-deploy-contracts.py

      - name: Portal type checks
        shell: bash
        run: |
          set -euo pipefail
          npm run type-check --prefix portals/website
          npm run type-check --prefix portals/console

      - name: Portal production builds
        shell: bash
        run: |
          set -euo pipefail
          npm run build --prefix portals/website
          npm run build --prefix portals/console
          npm run build --prefix portals/admin

      - name: Docker Compose config validation
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
        run: |
          set -euo pipefail
          docker compose --env-file .env.example config --quiet
