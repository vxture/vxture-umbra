name: deploy-worker-03

on:
  workflow_run:
    workflows:
      - docker-build
    types:
      - completed
    branches:
      - main

concurrency:
  group: deploy-worker-03
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: deploy-worker-03
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: >-
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      }}
    environment:
      name: worker-03

    steps:
      - name: Validate deployment secrets
        shell: bash
        env:
          WORKER_03_HOST: ${{ secrets.WORKER_03_HOST }}
          WORKER_03_USER: ${{ secrets.WORKER_03_USER }}
          WORKER_03_SSH_KEY: ${{ secrets.WORKER_03_SSH_KEY }}
          ALIYUN_ACR_REGISTRY: ${{ secrets.ALIYUN_ACR_REGISTRY }}
          ALIYUN_ACR_NAMESPACE: ${{ secrets.ALIYUN_ACR_NAMESPACE }}
        run: |
          set -euo pipefail
          test -n "$WORKER_03_HOST"
          test -n "$WORKER_03_USER"
          test -n "$WORKER_03_SSH_KEY"
          test -n "$ALIYUN_ACR_REGISTRY"
          test -n "$ALIYUN_ACR_NAMESPACE"

      - name: Prepare SSH
        shell: bash
        env:
          WORKER_03_HOST: ${{ secrets.WORKER_03_HOST }}
          WORKER_03_PORT: ${{ secrets.WORKER_03_PORT }}
          WORKER_03_SSH_KEY: ${{ secrets.WORKER_03_SSH_KEY }}
          WORKER_03_KNOWN_HOSTS: ${{ secrets.WORKER_03_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$WORKER_03_SSH_KEY" > ~/.ssh/worker_03
          chmod 600 ~/.ssh/worker_03

          port="${WORKER_03_PORT:-22}"
          if [ -n "${WORKER_03_KNOWN_HOSTS:-}" ]; then
            printf '%s\n' "$WORKER_03_KNOWN_HOSTS" > ~/.ssh/known_hosts
          else
            ssh-keyscan -p "$port" "$WORKER_03_HOST" > ~/.ssh/known_hosts
          fi
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy over SSH
        shell: bash
        env:
          WORKER_03_HOST: ${{ secrets.WORKER_03_HOST }}
          WORKER_03_USER: ${{ secrets.WORKER_03_USER }}
          WORKER_03_PORT: ${{ secrets.WORKER_03_PORT }}
          WORKER_03_REPO_DIR: ${{ secrets.WORKER_03_REPO_DIR }}
          PASSED_SHA: ${{ github.event.workflow_run.head_sha }}
          ALIYUN_ACR_REGISTRY: ${{ secrets.ALIYUN_ACR_REGISTRY }}
          ALIYUN_ACR_NAMESPACE: ${{ secrets.ALIYUN_ACR_NAMESPACE }}
          ALIYUN_ACR_USERNAME: ${{ secrets.ALIYUN_ACR_USERNAME }}
          ALIYUN_ACR_PASSWORD: ${{ secrets.ALIYUN_ACR_PASSWORD }}
        run: |
          set -euo pipefail
          port="${WORKER_03_PORT:-22}"
          repo_dir="${WORKER_03_REPO_DIR:-/srv/vxture/repo/umbra}"
          short_sha="${PASSED_SHA::7}"
          image_tag="sha-$short_sha"

          cat > /tmp/deploy-worker-03.sh <<'REMOTE_SCRIPT'
          set -euo pipefail

          cd "$REPO_DIR"
          git fetch origin main
          git checkout main
          git merge --ff-only origin/main
          test "$(git rev-parse HEAD)" = "$PASSED_SHA"

          export IMAGE_REGISTRY="$ALIYUN_ACR_REGISTRY"
          export IMAGE_NAMESPACE="$ALIYUN_ACR_NAMESPACE"
          export IMAGE_TAG="$IMAGE_TAG"

          if [ -n "${ALIYUN_ACR_USERNAME:-}" ] && [ -n "${ALIYUN_ACR_PASSWORD:-}" ]; then
            printf '%s' "$ALIYUN_ACR_PASSWORD" \
              | docker login "$IMAGE_REGISTRY" -u "$ALIYUN_ACR_USERNAME" --password-stdin
          fi

          bash scripts/deploy.sh all
          bash scripts/deploy.sh verify
          REMOTE_SCRIPT

          scp -i ~/.ssh/worker_03 -P "$port" /tmp/deploy-worker-03.sh \
            "$WORKER_03_USER@$WORKER_03_HOST:/tmp/deploy-worker-03.sh"

          remote_env=(
            "REPO_DIR=$repo_dir"
            "PASSED_SHA=$PASSED_SHA"
            "IMAGE_TAG=$image_tag"
            "ALIYUN_ACR_REGISTRY=$ALIYUN_ACR_REGISTRY"
            "ALIYUN_ACR_NAMESPACE=$ALIYUN_ACR_NAMESPACE"
            "ALIYUN_ACR_USERNAME=$ALIYUN_ACR_USERNAME"
            "ALIYUN_ACR_PASSWORD=$ALIYUN_ACR_PASSWORD"
          )
          remote_cmd=""
          for item in "${remote_env[@]}"; do
            key="${item%%=*}"
            value="${item#*=}"
            printf -v escaped '%q=%q ' "$key" "$value"
            remote_cmd+="$escaped"
          done
          remote_cmd+="bash /tmp/deploy-worker-03.sh"

          ssh -i ~/.ssh/worker_03 -p "$port" "$WORKER_03_USER@$WORKER_03_HOST" "$remote_cmd"
