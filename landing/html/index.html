<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#07101f">
  <link rel="icon" href="favicon.ico" sizes="64x64">
  <title>如影随形 Ruyin</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    :root {
      color-scheme: dark;
      --bg-0: #07111f;
      --bg-1: #0a1726;
      --bg-2: #0b1d27;
      --text: #eefbff;
      --muted: #9fb2c3;
      --soft: #d7f6ff;
      --panel: rgba(7, 16, 31, 0.72);
      --panel-strong: rgba(11, 25, 45, 0.86);
      --line: rgba(135, 228, 255, 0.24);
      --line-strong: rgba(112, 226, 255, 0.48);
      --accent: #56d9ff;
      --accent-2: #8bf5c6;
      --shadow: rgba(0, 0, 0, 0.36);
      --radius: 8px;
      --max: 1180px;
    }

    body[data-theme="light"] {
      color-scheme: light;
      --bg-0: #f6f9fc;
      --bg-1: #eef4f8;
      --bg-2: #e9f5f2;
      --text: #0c1a2a;
      --muted: #526579;
      --soft: #10263d;
      --panel: rgba(255, 255, 255, 0.76);
      --panel-strong: rgba(255, 255, 255, 0.9);
      --line: rgba(22, 96, 140, 0.2);
      --line-strong: rgba(21, 118, 156, 0.42);
      --accent: #0077a8;
      --accent-2: #08846d;
      --shadow: rgba(37, 72, 110, 0.18);
    }

    html {
      min-height: 100%;
      background: var(--bg-0);
    }

    body {
      min-height: 100%;
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        linear-gradient(180deg, var(--bg-0) 0%, var(--bg-1) 52%, var(--bg-2) 100%);
      overflow-x: hidden;
    }

    .network {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      opacity: 0.74;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      padding: 22px;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      width: min(100%, var(--max));
      margin: 0 auto;
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
      color: var(--text);
      text-decoration: none;
    }

    .brand-logo {
      width: 34px;
      height: 34px;
      flex: 0 0 auto;
      display: block;
      object-fit: contain;
    }

    .brand-text {
      display: grid;
      gap: 2px;
      min-width: 0;
    }

    .brand-name {
      font-size: 1rem;
      font-weight: 800;
      line-height: 1.1;
    }

    .brand-line {
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.2;
      white-space: nowrap;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
    }

    .icon-button {
      width: 36px;
      height: 36px;
      display: inline-grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: var(--muted);
      background: rgba(8, 18, 32, 0.24);
      backdrop-filter: blur(16px);
      cursor: pointer;
      transition: transform 160ms ease, color 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    body[data-theme="light"] .icon-button {
      background: rgba(255, 255, 255, 0.54);
    }

    .icon-button:hover {
      color: var(--text);
      border-color: var(--line-strong);
      transform: translateY(-1px);
    }

    .icon-button svg {
      width: 17px;
      height: 17px;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .theme-icon-moon {
      display: none;
    }

    body[data-theme="light"] .theme-icon-sun {
      display: none;
    }

    body[data-theme="light"] .theme-icon-moon {
      display: block;
    }

    .portal {
      width: min(100%, var(--max));
      margin: auto;
      padding: 44px 0 30px;
      display: grid;
      gap: 32px;
      justify-items: center;
      text-align: center;
    }

    .hero {
      width: min(100%, 900px);
      display: grid;
      justify-items: center;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      color: var(--accent-2);
      font-size: 0.88rem;
      font-weight: 700;
    }

    .eyebrow::before {
      content: "";
      width: 34px;
      height: 1px;
      background: var(--accent-2);
    }

    .signature {
      width: min(74vw, 640px);
      margin: 0 auto;
    }

    .signature-art {
      display: block;
      width: 100%;
      height: auto;
      filter: drop-shadow(0 24px 52px rgba(0, 0, 0, 0.34));
    }

    body[data-theme="light"] .signature-art {
      filter: drop-shadow(0 18px 34px rgba(29, 83, 154, 0.18));
    }

    h1 {
      margin: 0;
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
      white-space: nowrap;
    }

    .lead {
      max-width: 680px;
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 1.02rem;
      line-height: 1.72;
    }

    .service:hover {
      transform: translateY(-2px);
      border-color: var(--accent);
    }

    .services {
      width: min(100%, 940px);
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    .service {
      position: relative;
      min-height: 152px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      backdrop-filter: blur(22px);
      color: var(--text);
      text-decoration: none;
      box-shadow: 0 18px 48px var(--shadow);
      overflow: hidden;
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    .service-inner {
      position: relative;
      min-height: 116px;
      display: grid;
      grid-template-rows: auto auto auto;
      align-content: start;
      gap: 10px;
      text-align: left;
    }

    .service-badge {
      position: absolute;
      top: 0;
      right: 0;
      width: 32px;
      height: 32px;
      display: block;
      object-fit: contain;
      pointer-events: none;
    }

    .service h2 {
      margin: 0;
      padding-right: 44px;
      font-size: 1.08rem;
      line-height: 1.2;
    }

    .service p {
      margin: 0;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.45;
    }

    .service-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--accent);
      font-weight: 760;
      font-size: 0.9rem;
    }

    .service-cta::after {
      content: ">";
      font-weight: 900;
    }

    .footer {
      width: min(100%, var(--max));
      margin: 0 auto;
      padding: 20px 0 2px;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      color: var(--muted);
      font-size: 0.84rem;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .status::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 99px;
      background: var(--accent-2);
      box-shadow: 0 0 18px var(--accent-2);
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation: none !important;
        scroll-behavior: auto !important;
      }
    }

    @media (max-width: 920px) {
      .portal {
        padding-top: 32px;
      }

      .services {
        grid-template-columns: 1fr;
      }

      .service {
        min-height: 132px;
      }

      .service-inner {
        min-height: 96px;
      }
    }

    @media (max-width: 640px) {
      .page {
        padding: 16px;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .controls {
        width: 100%;
        justify-content: flex-end;
      }

      .signature {
        width: min(92vw, 520px);
      }

      .lead {
        font-size: 1rem;
      }

      .footer {
        flex-direction: column;
      }
    }
  </style>
</head>
<body data-theme="dark">
  <canvas class="network" id="network" aria-hidden="true"></canvas>

  <div class="page">
    <header class="topbar" aria-label="Ruyin">
      <a class="brand" href="https://{{ APEX_DOMAIN }}" aria-label="Ruyin home">
        <img class="brand-logo" src="assets/brand/vxture-logo-white.png" alt="">
        <span class="brand-text">
          <span class="brand-name">Ruyin</span>
          <span class="brand-line" data-i18n="brandLine">智能服务门户</span>
        </span>
      </a>

      <div class="controls" aria-label="Display controls">
        <button class="icon-button" type="button" id="lang-toggle" aria-label="Switch language" title="Switch language">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="10"></circle>
            <path d="M2 12h20"></path>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
          </svg>
        </button>
        <button class="icon-button" type="button" id="theme-toggle" aria-label="Switch theme" title="Switch theme">
          <svg class="theme-icon-moon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M21 12.8A8.5 8.5 0 1 1 11.2 3 6.7 6.7 0 0 0 21 12.8z"></path>
          </svg>
          <svg class="theme-icon-sun" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="4"></circle>
            <path d="M12 2v2"></path>
            <path d="M12 20v2"></path>
            <path d="m4.93 4.93 1.41 1.41"></path>
            <path d="m17.66 17.66 1.41 1.41"></path>
            <path d="M2 12h2"></path>
            <path d="M20 12h2"></path>
            <path d="m6.34 17.66-1.41 1.41"></path>
            <path d="m19.07 4.93-1.41 1.41"></path>
          </svg>
        </button>
      </div>
    </header>

    <main class="portal">
      <section class="hero" aria-labelledby="hero-title">
        <div class="eyebrow" data-i18n="eyebrow">Ruyin Digital Entry</div>
        <div class="signature">
          <img class="signature-art" id="signature-art" src="assets/brand/ruyin-dark.png" alt="如影随形">
        </div>
        <h1 id="hero-title" data-i18n="title">如影随形</h1>
        <p class="lead" data-i18n="lead">
          如影智能网络入口，连接智能工作台、代理网络与个人密码柜。
        </p>
      </section>

      <section class="services" aria-label="Ruyin services">
        <a class="service" href="https://hermes.vxture.com">
          <span class="service-inner">
            <img class="service-badge" src="assets/icons/agent-icon-64.gif" alt="">
            <h2 data-i18n="hermesTitle">Hermes 智能工作台</h2>
            <p data-i18n="hermesText">任务编排与智能协作。</p>
            <span class="service-cta" data-i18n="openService">打开服务</span>
          </span>
        </a>

        <a class="service" href="https://{{ EDGE_DOMAIN }}">
          <span class="service-inner">
            <img class="service-badge" src="assets/icons/agent-icon-64.gif" alt="">
            <h2 data-i18n="proxyTitle">Proxy 私有代理网络</h2>
            <p data-i18n="proxyText">订阅、节点与安全访问。</p>
            <span class="service-cta" data-i18n="openService">打开服务</span>
          </span>
        </a>

        <a class="service" href="https://{{ PASS_DOMAIN }}">
          <span class="service-inner">
            <img class="service-badge" src="assets/icons/agent-icon-64.gif" alt="">
            <h2 data-i18n="passTitle">个人密码柜</h2>
            <p data-i18n="passText">账号、密钥与敏感信息。</p>
            <span class="service-cta" data-i18n="openService">打开服务</span>
          </span>
        </a>
      </section>
    </main>

    <footer class="footer">
      <span>{{ APEX_DOMAIN }}</span>
      <span class="status" data-i18n="status">Edge portal online</span>
    </footer>
  </div>

  <script>
    (function () {
      var copy = {
        zh: {
          brandLine: "智能服务门户",
          langToEn: "切换到英文",
          langToZh: "切换到中文",
          themeToDark: "切换到深色主题",
          themeToLight: "切换到浅色主题",
          eyebrow: "Ruyin Digital Entry",
          title: "如影随形",
          lead: "如影智能网络入口，连接智能工作台、代理网络与个人密码柜。",
          hermesTitle: "Hermes 智能工作台",
          hermesText: "任务编排与智能协作。",
          proxyTitle: "Proxy 私有代理网络",
          proxyText: "订阅、节点与安全访问。",
          passTitle: "个人密码柜",
          passText: "账号、密钥与敏感信息。",
          openService: "打开服务",
          status: "Edge portal online"
        },
        en: {
          brandLine: "Intelligent service portal",
          langToEn: "Switch to English",
          langToZh: "Switch to Chinese",
          themeToDark: "Switch to dark theme",
          themeToLight: "Switch to light theme",
          eyebrow: "Ruyin Digital Entry",
          title: "Ruyin, always with you",
          lead: "The Ruyin intelligent network entry for workspace, proxy access, and your personal password vault.",
          hermesTitle: "Hermes workspace",
          hermesText: "Task orchestration and intelligent collaboration.",
          proxyTitle: "Proxy private network",
          proxyText: "Subscriptions, nodes, and secure access.",
          passTitle: "Personal password vault",
          passText: "Accounts, keys, and sensitive information.",
          openService: "Open service",
          status: "Edge portal online"
        }
      };

      var html = document.documentElement;
      var body = document.body;

      function updateControlLabels() {
        var lang = html.lang === "zh-CN" ? "zh" : "en";
        var table = copy[lang] || copy.zh;
        var theme = body.getAttribute("data-theme") || "dark";
        var langToggle = document.getElementById("lang-toggle");
        var themeToggle = document.getElementById("theme-toggle");
        if (langToggle) {
          var langLabel = lang === "zh" ? table.langToEn : table.langToZh;
          langToggle.setAttribute("aria-label", langLabel);
          langToggle.setAttribute("title", langLabel);
        }
        if (themeToggle) {
          var themeLabel = theme === "dark" ? table.themeToLight : table.themeToDark;
          themeToggle.setAttribute("aria-label", themeLabel);
          themeToggle.setAttribute("title", themeLabel);
        }
      }

      function setLang(lang) {
        var table = copy[lang] || copy.zh;
        html.lang = lang === "zh" ? "zh-CN" : "en";
        document.querySelectorAll("[data-i18n]").forEach(function (node) {
          var key = node.getAttribute("data-i18n");
          if (table[key]) node.textContent = table[key];
        });
        updateControlLabels();
        localStorage.setItem("ruyin.lang", lang);
      }

      function setTheme(theme) {
        body.setAttribute("data-theme", theme);
        var signature = document.getElementById("signature-art");
        if (signature) {
          signature.src = theme === "light"
            ? "assets/brand/ruyin-light.png"
            : "assets/brand/ruyin-dark.png";
        }
        updateControlLabels();
        localStorage.setItem("ruyin.theme", theme);
      }

      document.getElementById("lang-toggle").addEventListener("click", function () {
        setLang(html.lang === "zh-CN" ? "en" : "zh");
      });

      document.getElementById("theme-toggle").addEventListener("click", function () {
        setTheme(body.getAttribute("data-theme") === "light" ? "dark" : "light");
      });

      setTheme(localStorage.getItem("ruyin.theme") || "dark");
      setLang(localStorage.getItem("ruyin.lang") || "zh");

      var canvas = document.getElementById("network");
      var ctx = canvas.getContext("2d");
      var points = [];
      var reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      if (!ctx) return;

      function resize() {
        var ratio = Math.min(window.devicePixelRatio || 1, 2);
        canvas.width = Math.floor(window.innerWidth * ratio);
        canvas.height = Math.floor(window.innerHeight * ratio);
        canvas.style.width = window.innerWidth + "px";
        canvas.style.height = window.innerHeight + "px";
        ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
        seed();
      }

      function seed() {
        var count = window.innerWidth < 720 ? 34 : 58;
        points = [];
        for (var i = 0; i < count; i++) {
          points.push({
            x: Math.random() * window.innerWidth,
            y: Math.random() * window.innerHeight,
            vx: (Math.random() - 0.5) * 0.32,
            vy: (Math.random() - 0.5) * 0.32
          });
        }
      }

      function color(alpha) {
        return body.getAttribute("data-theme") === "light"
          ? "rgba(0, 119, 168, " + alpha + ")"
          : "rgba(86, 217, 255, " + alpha + ")";
      }

      function draw() {
        ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
        for (var i = 0; i < points.length; i++) {
          var p = points[i];
          if (!reduce) {
            p.x += p.vx;
            p.y += p.vy;
            if (p.x < -20) p.x = window.innerWidth + 20;
            if (p.x > window.innerWidth + 20) p.x = -20;
            if (p.y < -20) p.y = window.innerHeight + 20;
            if (p.y > window.innerHeight + 20) p.y = -20;
          }
          ctx.fillStyle = color(0.58);
          ctx.fillRect(p.x, p.y, 2, 2);

          for (var j = i + 1; j < points.length; j++) {
            var q = points[j];
            var dx = p.x - q.x;
            var dy = p.y - q.y;
            var distance = Math.sqrt(dx * dx + dy * dy);
            if (distance < 138) {
              ctx.strokeStyle = color((1 - distance / 138) * 0.22);
              ctx.lineWidth = 1;
              ctx.beginPath();
              ctx.moveTo(p.x, p.y);
              ctx.lineTo(q.x, q.y);
              ctx.stroke();
            }
          }
        }
        if (!reduce) requestAnimationFrame(draw);
      }

      window.addEventListener("resize", resize);
      resize();
      draw();
    })();
  </script>
</body>
</html>
